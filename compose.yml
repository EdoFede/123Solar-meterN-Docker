name: 123solar-metern

services:
  # web  → official nginx:alpine, serves static files + reverse-proxies PHP
  web:
    container_name: web
    image: nginx:alpine
    networks:
      - 123solar-metern
    ports:
      - "${HTTP_PORT:-10088}:80"
    volumes:
      - app-code:/var/www:ro
      - ./config/123Solar:/var/www/123solar/config:ro
      - ./data/123Solar:/var/www/123solar/data:ro
      - ./config/meterN:/var/www/metern/config:ro
      - ./data/meterN:/var/www/metern/data:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - TZ=${TZ:-Europe/Rome}
    depends_on:
      php:
        condition: service_healthy
    restart: unless-stopped
    # nginx:alpine ships busybox wget; hit the static landing page (populated
    # by the php container's install-apps.sh at first boot).
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/index.html"]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 3

  php:
    # php  → custom thin image (php-fpm + serial tools), runs the apps
    build:
      context: ./php
    container_name: php
    image: ghcr.io/edofede/123solar-metern:latest
    env_file: .env
    networks:
      - 123solar-metern
    environment:
      - TZ=${TZ:-Europe/Rome}
      - WEB_HOST=web
      - WEB_PORT=80
    devices:
      - "${SERIAL_DEVICE:-/dev/ttyUSB0}:/dev/ttyUSB0"
    volumes:
      - app-code:/var/www
      - ./config/123Solar:/var/www/123solar/config
      - ./data/123Solar:/var/www/123solar/data
      - ./config/meterN:/var/www/metern/config
      - ./data/meterN:/var/www/metern/data
    restart: unless-stopped


# ─── Volumi ────────────────────────────────────────────────────────
volumes:
  app-code:
    name: app-code


# ─── Networks ──────────────────────────────────────────────────────
networks:
  123solar-metern:
    name: 123solar-metern
    driver: bridge
    ipam:
      config:
        - subnet: 172.26.126.0/26
          gateway: 172.26.126.1