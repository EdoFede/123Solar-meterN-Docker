; php/conf.d/zz-app.ini — php.ini overrides (loaded last, "zz-" prefix)

; 123Solar and meterN were written for older PHP: several scripts emit HTML
; before calling header()/setcookie() (e.g. metern/admin/index.php prints
; <!DOCTYPE> at line 10, then redirects at line 119). They rely on PHP's
; historical default of output buffering being ON. The official php-fpm image
; ships output_buffering=0, so those redirects fail with
; "Cannot modify header information - headers already sent" and pages load only
; partially. Turning output buffering back on fixes it.
output_buffering = 4096

; The apps target an older PHP and trigger a lot of E_DEPRECATED / E_NOTICE
; noise ("Using ${expr} in strings", undefined variables, …). Silence those
; classes (keep real errors) so logs stay readable and, more importantly, so
; that with a misconfiguration they can never leak into the page output ahead
; of headers. We still log genuine errors to stderr.
error_reporting = E_ALL & ~E_DEPRECATED & ~E_NOTICE & ~E_WARNING & ~E_STRICT

; Log PHP errors to stderr so they surface via `docker compose logs php`.
; display_errors stays Off: errors must never end up in the HTTP response
; (that is what breaks header() calls in this legacy code).
log_errors = On
error_log = /proc/self/fd/2
display_errors = Off

; Timezone comes from the TZ env var (set via docker-compose / .env).
; date.timezone is left unset on purpose; the apps read TZ from the OS.

; The apps exec() external tools (sdm120c, aurora, pooler485, rrdtool) — these
; must NOT be disabled.
; cgi.fix_pathinfo must be off (security + correct SCRIPT_FILENAME handling).
cgi.fix_pathinfo = 0

memory_limit = 256M
max_execution_time = 120
