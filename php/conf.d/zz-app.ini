; php/conf.d/zz-app.ini — php.ini overrides (loaded last, "zz-" prefix)

; Log PHP errors to stderr so they surface via `docker compose logs php`.
log_errors = On
error_log = /proc/self/fd/2
display_errors = Off

; Timezone comes from the TZ env var (set via docker-compose / .env).
; date.timezone is left unset on purpose; the apps read TZ from the OS.

; The apps exec() external tools (sdm120c, aurora, pooler485, rrdtool) — these
; must NOT be disabled.
; cgi.fix_pathinfo must be off (security + correct SCRIPT_FILENAME handling).
cgi.fix_pathinfo = 0

memory_limit = 256M
max_execution_time = 120
