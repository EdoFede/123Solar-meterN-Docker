; php/fpm/www.conf — pool overrides (loaded as zz-www.conf, after the default)
;
; Reachable from the nginx container via  fastcgi_pass php:9000.
; Logs go to the container's stderr so `docker compose logs php` works without
; syslog-ng (which the legacy image needed).

[www]
user = www-data
group = www-data

listen = 0.0.0.0:9000

; Send worker stdout/stderr and the FPM access log to the container stderr.
catch_workers_output = yes
decorate_workers_output = no
access.log = /proc/self/fd/2
access.format = "%R - %u %t \"%m %r\" %s %{mili}d ms %{kilo}M kb"

; Do not clear env vars: the apps and comapps rely on TZ, WWW_ROOT, etc.
clear_env = no

; Dynamic process manager — modest defaults suitable for a home solar box.
pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4
pm.max_requests = 500
