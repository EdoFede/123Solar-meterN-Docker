# nginx/default.conf — server block for 123Solar + meterN
#
# Mounted read-only into the official nginx:alpine image (no custom build).
# The app code lives on the shared "app-code" volume, populated by the php
# container's install-apps.sh. PHP is executed in the php container over
# FastCGI (fastcgi_pass php:9000).

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /var/www;
    index index.html index.htm index.php;

    server_name _;

    # Landing page + directory listing (like the legacy image).
    location / {
        try_files $uri $uri/ =404;
        autoindex on;
    }

    # Basic-auth on the admin areas of both apps. The .htpasswd files live in
    # each app's config/ (default admin/admin seeded on first boot).
    location /123solar/admin {
        auth_basic "Administrator Login";
        auth_basic_user_file /var/www/123solar/config/.htpasswd;
    }

    location /metern/admin {
        auth_basic "Administrator Login";
        auth_basic_user_file /var/www/metern/config/.htpasswd;
    }

    # PHP over FastCGI to the php container.
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+?\.php)(/.*)$;
        if (!-f $document_root$fastcgi_script_name) {
            return 404;
        }
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Never serve .htpasswd / .htaccess.
    location ~ /\.ht {
        deny all;
    }
}
