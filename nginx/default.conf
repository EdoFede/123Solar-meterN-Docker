# nginx/default.conf — server block for 123Solar + meterN
#
# Mounted read-only into the official nginx:alpine image (no custom build).
# The app code lives on the shared "app-code" volume, populated by the php
# container's install-apps.sh. PHP is executed in the php container over
# FastCGI (fastcgi_pass php:9000).

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /var/www;
    index index.html index.htm index.php;

    server_name _;

    # Landing page + directory listing (like the legacy image).
    location / {
        try_files $uri $uri/ =404;
        autoindex on;
    }

    # Admin areas: HTTP basic-auth on the whole prefix (static AND php), and —
    # crucially — the credentials are forwarded to PHP-FPM. 123Solar/meterN read
    # $_SERVER['PHP_AUTH_USER'] to gate their admin pages: admin/index.php shows
    # "Your webserver don't allow HTTP authentication" and never redirects to
    # admin.php unless PHP_AUTH_USER is set. With nginx doing the auth and php in
    # a separate FastCGI container, that variable is populated only if we pass
    # the Authorization header through (fastcgi_param HTTP_AUTHORIZATION); modern
    # php-fpm then decodes it into PHP_AUTH_USER / PHP_AUTH_PW.
    #
    # One location per app so the .htpasswd path is static (a regex-captured
    # variable is unreliable inside the nested php location).
    location ^~ /123solar/admin {
        auth_basic "Administrator Login";
        auth_basic_user_file /var/www/123solar/config/.htpasswd;

        location ~ \.php$ {
            auth_basic "Administrator Login";
            auth_basic_user_file /var/www/123solar/config/.htpasswd;
            include fastcgi_params;
            fastcgi_pass php:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param HTTP_AUTHORIZATION $http_authorization;
        }
    }

    location ^~ /metern/admin {
        auth_basic "Administrator Login";
        auth_basic_user_file /var/www/metern/config/.htpasswd;

        location ~ \.php$ {
            auth_basic "Administrator Login";
            auth_basic_user_file /var/www/metern/config/.htpasswd;
            include fastcgi_params;
            fastcgi_pass php:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param HTTP_AUTHORIZATION $http_authorization;
        }
    }

    # PHP over FastCGI to the php container (non-admin scripts).
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+?\.php)(/.*)$;
        if (!-f $document_root$fastcgi_script_name) {
            return 404;
        }
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        # Forward auth too, so apps that read PHP_AUTH_USER outside /admin work.
        fastcgi_param HTTP_AUTHORIZATION $http_authorization;
    }

    # Never serve .htpasswd / .htaccess.
    location ~ /\.ht {
        deny all;
    }
}
