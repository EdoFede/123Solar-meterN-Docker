# docker-compose.yml — 123Solar + meterN, multi-container
#
#   web  → official nginx:alpine, serves static files + reverse-proxies PHP
#   php  → custom thin image (php-fpm + serial tools), runs the apps
#
# Copy .env.example to .env and adjust values first:  cp .env.example .env

services:
  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - app-code:/var/www:ro
      # nginx needs the per-app config (for the basic-auth .htpasswd) and data
      # (RRD graphs served as static files), same paths the php container writes.
      - ./config/123Solar:/var/www/123solar/config:ro
      - ./data/123Solar:/var/www/123solar/data:ro
      - ./config/meterN:/var/www/metern/config:ro
      - ./data/meterN:/var/www/metern/data:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - TZ=${TZ:-Europe/Rome}
    depends_on:
      - php

  php:
    build:
      context: ./php
    image: ghcr.io/edofede/123solar-metern:latest
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=${TZ:-Europe/Rome}
      - WEB_HOST=web
      - WEB_PORT=80
    # RS485 serial adapter for pooler485/sdm120c/aurora.
    # Comment this out on hosts without the device (e.g. first-time testing).
    devices:
      - "${SERIAL_DEVICE:-/dev/ttyUSB0}:/dev/ttyUSB0"
    volumes:
      - app-code:/var/www
      - ./config/123Solar:/var/www/123solar/config
      - ./data/123Solar:/var/www/123solar/data
      - ./config/meterN:/var/www/metern/config
      - ./data/meterN:/var/www/metern/data

volumes:
  # Shared app code (123Solar/meterN), populated at first boot by
  # php/install-apps.sh. Kept as a Docker-managed volume (rebuildable);
  # config/ and data/ are bind-mounted to the host (see the services above).
  app-code:
