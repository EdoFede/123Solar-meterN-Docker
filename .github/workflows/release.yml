name: release

# The heavy multi-arch build + publish runs ONLY when you push a version tag
# (e.g. `git tag v1.2.3 && git push origin v1.2.3`), reproducing the old flow:
# a new tag/release builds the image and also updates the `latest` tag.
# Plain pushes to master do NOT publish — they only run the amd64 test in ci.yml.
on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # to push to GHCR
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      # --- Login ---
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/edofede/123solar-metern
            edofede/123solar-metern
          # This project uses two-part version tags (vX.Y), not full 3-part
          # SemVer, so we cannot use type=semver (it only matches vX.Y.Z).
          # type=match extracts the numeric parts from the git tag:
          #   v5.0  -> 5.0  and  5      plus the `latest` tag.
          tags: |
            type=match,pattern=v(\d+\.\d+),group=1
            type=match,pattern=v(\d+)\.\d+,group=1
            type=raw,value=latest
          # The `v` prefix is stripped by the patterns above.
          flavor: |
            latest=false

      - name: Build & push (php image)
        uses: docker/build-push-action@v6
        with:
          context: ./php
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6,linux/386,linux/ppc64le
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
