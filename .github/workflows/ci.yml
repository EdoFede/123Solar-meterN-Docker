name: ci
on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
    tags-ignore: ['v*']   # version tags are handled by release.yml (full multi-arch + publish)

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (amd64, no push)
        uses: docker/build-push-action@v6
        with:
          context: ./php
          platforms: linux/amd64
          push: false
          load: true
          tags: 123solar-metern:ci

      - name: Smoke test — php-fpm config + serial tools
        run: |
          docker run --rm --entrypoint php-fpm 123solar-metern:ci -t
          docker run --rm --entrypoint sh 123solar-metern:ci -c '
            set -e
            sdm120c 2>&1 | grep -q "ModBus RTU"
            ldd /usr/local/bin/sdm120c | grep -q libmodbus
            command -v aurora rrdtool pooler485 reqLineValues >/dev/null
            id www-data | grep -q dialout
            echo "smoke test OK"
          '
